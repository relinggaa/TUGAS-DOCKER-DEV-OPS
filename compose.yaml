services:
  server:
    build:
      context: .

    container_name: php_app

    ports:
      - "9000:80"

    volumes:
      - ./src:/var/www/html

    depends_on:
      - db

  db:
    image: mariadb:11

    container_name: mariadb_db

    restart: always

    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: example

    ports:
      - "3306:3306"

    volumes:
      - db-data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin

    container_name: phpmyadmin

    ports:
      - "8080:80"

    depends_on:
      - db

    environment:
      PMA_HOST: db

volumes:
  db-data:
